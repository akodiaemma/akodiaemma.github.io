<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CrossGate Connect - Full Scope Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif}
body{background:#f5f5f3;padding:12px;min-height:100vh}
#wrap{display:flex;height:calc(100vh - 24px);min-height:620px;border-radius:12px;border:0.5px solid #d3d1c7;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.08)}
#sidebar{width:275px;min-width:275px;display:flex;flex-direction:column;border-right:0.5px solid #d3d1c7;background:#f1efe8;overflow:hidden}
#sb-top{padding:10px 12px;border-bottom:0.5px solid #d3d1c7}
#sb-title{font-size:12px;font-weight:600;color:#2c2c2a;margin-bottom:2px}
#sb-sub{font-size:10px;color:#5f5e5a}
#sb-scroll{flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:1px}
.sb-phase{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#888780;margin:8px 0 3px 4px}
.sb-phase-price{font-size:9px;color:#5f5e5a;font-weight:400;letter-spacing:0;text-transform:none;margin-left:4px}
.mod-header{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;cursor:pointer;transition:background .12s;user-select:none}
.mod-header:hover{background:#e8e6df}
.mod-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mod-check{width:12px;height:12px;flex-shrink:0;accent-color:#1D9E75;cursor:pointer}
.mod-check:disabled{cursor:default;opacity:.5}
.mod-label{flex:1;font-size:10.5px;font-weight:500;color:#2c2c2a;line-height:1.3}
.mod-price{font-size:10px;color:#5f5e5a;white-space:nowrap}
.mod-arrow{font-size:9px;color:#888780;transition:transform .2s;margin-left:2px;flex-shrink:0}
.mod-arrow.open{transform:rotate(90deg)}
.feat-list{display:none;padding:2px 0 4px 14px;flex-direction:column;gap:1px}
.feat-list.open{display:flex}
.feat-row{display:flex;align-items:flex-start;gap:5px;padding:3px 4px;border-radius:4px;transition:background .1s}
.feat-row:hover{background:#e8e6df}
.feat-check{width:11px;height:11px;flex-shrink:0;margin-top:2px;accent-color:#1D9E75;cursor:pointer}
.feat-check:disabled{opacity:.4;cursor:default}
.feat-label{font-size:9.5px;color:#444441;line-height:1.35;flex:1}
.feat-badge{font-size:8px;font-weight:700;border-radius:3px;padding:1px 4px;flex-shrink:0;margin-top:2px}
#sb-footer{padding:10px 12px;border-top:0.5px solid #d3d1c7;background:#fff}
#total-label{font-size:9.5px;color:#5f5e5a;margin-bottom:2px}
#total-val{font-size:17px;font-weight:600;color:#2c2c2a}
#total-build{font-size:10px;color:#888780;margin-top:1px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#fff;min-width:0}
#topbar{padding:8px 12px;border-bottom:0.5px solid #d3d1c7;display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:#fff;flex-shrink:0}
.bbtn{padding:5px 12px;font-size:11px;border-radius:16px;border:0.5px solid #b4b2a9;background:transparent;color:#5f5e5a;cursor:pointer;font-weight:500;transition:all .18s}
.bbtn:hover{background:#f1efe8}
.bbtn.on{background:#2c2c2a;color:#fff;border-color:#2c2c2a}
.legend{display:flex;gap:8px;flex-wrap:wrap;padding:5px 12px;font-size:9.5px;color:#5f5e5a;border-bottom:0.5px solid #d3d1c7;background:#f9f9f7;flex-shrink:0}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:7px;height:7px;border-radius:50%}
#canvas-wrap{flex:1;overflow:auto;padding:16px;position:relative}
#canvas{position:relative;width:990px}
.col-head-el{position:absolute;top:0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;text-align:center;padding-bottom:5px;border-bottom:2px solid currentColor;width:220px}
.node{position:absolute;width:220px;border-radius:8px;padding:7px 28px 7px 9px;transition:opacity .25s,transform .25s;border:0.5px solid transparent}
.node:hover{z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.13)}
.node.hidden{opacity:0;pointer-events:none;transform:scale(0.85)}
.node-title{font-weight:600;font-size:10px;line-height:1.3;margin-bottom:1px;color:inherit}
.node-sub{font-size:9px;opacity:.7;line-height:1.3;color:inherit}
.nbadge{display:inline-block;font-size:8px;font-weight:700;border-radius:3px;padding:1px 4px;margin-top:3px}
.b-alpha{background:#1D9E75;color:#fff}.b-beta{background:#378ADD;color:#fff}.b-full{background:#534AB7;color:#fff}
.n-teal{background:#E1F5EE;border-color:#5DCAA5;color:#04342C}
.n-blue{background:#E6F1FB;border-color:#85B7EB;color:#042C53}
.n-purple{background:#EEEDFE;border-color:#AFA9EC;color:#26215C}
.n-coral{background:#FAECE7;border-color:#F0997B;color:#4A1B0C}
.n-amber{background:#FAEEDA;border-color:#EF9F27;color:#412402}
.n-green{background:#EAF3DE;border-color:#97C459;color:#173404}
.n-gray{background:#f1efe8;border-color:#b4b2a9;color:#5f5e5a}
.info-btn{position:absolute;top:7px;right:7px;width:16px;height:16px;border-radius:50%;border:1px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;opacity:.55;transition:opacity .15s;z-index:5}
.info-btn:hover{opacity:1}
#info-panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:460px;max-width:95vw;max-height:82vh;background:#fff;border-radius:12px;border:0.5px solid #d3d1c7;box-shadow:0 8px 40px rgba(0,0,0,.18);z-index:1000;display:none;flex-direction:column;overflow:hidden}
#info-panel.open{display:flex}
#info-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:999;display:none}
#info-overlay.open{display:block}
#info-head{padding:14px 16px 10px;border-bottom:0.5px solid #e8e6df;display:flex;align-items:flex-start;gap:8px}
#info-title{font-size:13px;font-weight:600;color:#2c2c2a;flex:1;line-height:1.4}
#info-close{background:none;border:none;font-size:18px;color:#888780;cursor:pointer;line-height:1;padding:0;flex-shrink:0}
#info-body{padding:14px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.info-sec-title{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888780;margin-bottom:5px}
.info-text{font-size:11px;color:#444441;line-height:1.65}
.tech-tag{display:inline-block;font-size:9.5px;background:#f1efe8;border:0.5px solid #d3d1c7;color:#444441;border-radius:4px;padding:2px 7px;margin:2px 3px 2px 0}
.info-badge{display:inline-block;font-size:9px;font-weight:700;border-radius:3px;padding:2px 6px;margin-right:4px}
.ui-box{background:#f9f9f7;border:0.5px solid #d3d1c7;border-radius:8px;padding:10px 12px;font-size:10.5px;color:#444441;line-height:1.6}
.ui-box strong{color:#2c2c2a;font-weight:600}
svg#svgl{position:absolute;top:0;left:0;pointer-events:none}
</style>
</head>
<body>
<div id="info-overlay" onclick="closeInfo()"></div>
<div id="info-panel">
  <div id="info-head">
    <div id="info-title">Feature detail</div>
    <button id="info-close" onclick="closeInfo()">×</button>
  </div>
  <div id="info-body"></div>
</div>
<div id="wrap">
<div id="sidebar">
  <div id="sb-top"><div id="sb-title">Modules + pricing</div><div id="sb-sub">Click module to expand features. Untick any feature to remove it from the total.</div></div>
  <div id="sb-scroll"></div>
  <div id="sb-footer">
    <div id="total-label">Selected total</div>
    <div id="total-val">10,000,000 UGX</div>
    <div id="total-build">Alpha build</div>
  </div>
</div>
<div id="main">
  <div id="topbar">
    <span style="font-size:11px;font-weight:600;color:#5f5e5a">View:</span>
    <button class="bbtn on" onclick="setBuild('alpha',this)">Alpha — 10M UGX</button>
    <button class="bbtn" onclick="setBuild('beta',this)">Beta — +17M UGX</button>
    <button class="bbtn" onclick="setBuild('full',this)">Full scope — 44.5M UGX</button>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>SME / Farmer</div>
    <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>UK/EU Buyer</div>
    <div class="leg"><div class="leg-dot" style="background:#7F77DD"></div>Diaspora Investor</div>
    <div class="leg"><div class="leg-dot" style="background:#D85A30"></div>Admin + Shared</div>
    <span style="margin-left:auto;font-size:9px;color:#888780">Click i on any feature for full build detail + UI notes</span>
  </div>
  <div id="canvas-wrap"><div id="canvas"><svg id="svgl"></svg></div></div>
</div>
</div>

<script>
const BADGE={alpha:{cls:'b-alpha',lbl:'Alpha'},beta:{cls:'b-beta',lbl:'Beta'},full:{cls:'b-full',lbl:'Full'}};
const COLX=[10,260,510,760],NW=220,NH=82,GAP=8;
const COL_HEADS=[
  {label:'SME / Farmer',x:10,color:'#1D9E75'},
  {label:'UK/EU Buyer',x:260,color:'#378ADD'},
  {label:'Diaspora Investor',x:510,color:'#7F77DD'},
  {label:'Admin + Shared',x:760,color:'#D85A30'},
];

// Feature price = module price / number of features (evenly split, used for per-feature deduction)
// We track which features are checked — unchecking deducts its share from total

const MODS = [
 {id:'A',name:'Registration & Onboarding',phase:'alpha',price:1000000,color:'#1D9E75',cls:'n-teal',col:0,features:[
  {t:'Email + phone account creation',s:'All 4 user types',b:'alpha',
   info:'Handles secure account creation for SME farmers, diaspora investors, UK/EU buyers, and platform admins. Uses email OTP and phone SMS confirmation. Passwords are hashed with bcrypt. Sessions use JWT tokens with 24-hour expiry.',
   ui:'Screen: Full-page registration form. Top: CrossGate logo. Fields: Full name, email, phone number, password, confirm password, user type selector (4 large icon buttons — SME, Buyer, Diaspora, Admin). Bottom: "Create account" primary button. Below that: "Already have an account? Sign in" link. On mobile: single-column stacked layout. Error states shown inline below each field in red.',
   tech:['Firebase Auth or Supabase Auth','JWT tokens','Twilio SMS OTP','bcrypt password hashing','PostgreSQL users table']},
  {t:'User type selection at registration',s:'SME, buyer, diaspora, admin',b:'alpha',
   info:'Role selection at sign-up determines which dashboard the user sees and which features they can access. Role is stored in the JWT and enforced on every API call server-side.',
   ui:'Screen: Step 2 of registration (after email/phone). Four large cards in a 2x2 grid, each with an icon and label: SME Farmer (tractor icon), UK/EU Buyer (handshake icon), Diaspora Investor (globe icon), Admin (shield icon). Selected card gets a green border. "Continue" button activates after selection.',
   tech:['RBAC (PostgreSQL roles)','JWT role claims','React conditional rendering']},
  {t:'Voice-first onboarding',s:'English, Swahili, Luganda',b:'alpha',
   info:'Stiv AI guides the user through all onboarding steps by voice. User speaks answers, Stiv transcribes and confirms before proceeding. Critical for low-literacy rural users. Say "Hey Stiv" to activate at any point.',
   ui:'Screen: Clean white screen with a large animated microphone icon in the centre. Stiv avatar (small robot face) in top-left corner with a speech bubble showing the current question in text and audio. Below: a waveform animation when user is speaking. "Skip to text" button bottom-right. Language selector (EN/SW/LG) top-right.',
   tech:['Whisper API (speech-to-text)','ElevenLabs TTS (Stiv voice)','WebRTC audio capture','Wake word detection']},
  {t:'Text-based onboarding',s:'Standard form flow alternative',b:'alpha',
   info:'Standard form-based registration for users who prefer typing. Stiv AI is available as a floating chat button to explain any field.',
   ui:'Screen: Multi-step form with a progress bar at the top (Step 1 of 4, Step 2 of 4 etc.). Each step has 2-3 fields maximum to avoid overwhelm. Stiv AI chat button fixed bottom-right — tapping it opens a chat overlay explaining the current field.',
   tech:['React Hook Form','Zod validation','Stiv AI context-aware help']},
  {t:'SME profile creation',s:'Name, location, commodity, contacts',b:'alpha',
   info:'Creates the supplier profile used across the entire platform for buyer matching, ESG scoring, and compliance guidance.',
   ui:'Screen: Profile setup wizard. Step 1: Business name + photo upload. Step 2: Location (Google Maps pin drop — user taps on map to set location). Step 3: Commodity type (checkbox grid — Coffee, Tea, Fish, Dairy, Vegetables, Grains, Other). Step 4: Contact details. Progress dots at top.',
   tech:['Google Maps API (location pin)','react-dropzone (photo upload)','S3/Cloudinary','PostgreSQL SME_profiles table']},
  {t:'Document upload for business proof',s:'Photo or scan of registration doc',b:'alpha',
   info:'SME uploads proof of business registration. Stiv AI OCR extracts business name, registration number, and date to auto-fill profile fields.',
   ui:'Screen: Large dashed upload box in the centre with a camera icon and text "Tap to upload or take a photo of your business registration document". Below the box: accepted formats listed (JPG, PNG, PDF). After upload: thumbnail preview with a green tick and extracted fields shown below for user to confirm.',
   tech:['AWS Textract OCR','Stiv AI field extraction','S3/Cloudinary','react-dropzone']},
  {t:'Onboarding completion tracker',s:'Visual progress shown per step',b:'alpha',
   info:'Step-by-step progress bar saved server-side so user can resume from exactly where they left off after closing the app.',
   ui:'Component: Horizontal step bar at top of onboarding screens. Each step is a numbered circle: grey (not started), blue (current), green tick (complete). On the SME dashboard home screen a separate "Complete your profile" card shows overall % with a "Continue" button.',
   tech:['PostgreSQL onboarding_progress table','React stepper component','Stiv AI resume reminder']},
  {t:'Onboarding completion rate for admin',s:'Live % tracked in admin dashboard',b:'alpha',
   info:'Admin sees real-time completion rates by user type, country, and date range. Used to track the Alpha 1 KPI of 5-10 SMEs fully onboarded.',
   ui:'Admin screen: A metric card on the admin dashboard showing "Onboarding completion rate" as a large percentage with a sparkline trend chart below. Clicking the card opens a drill-down table showing each user and their completion step.',
   tech:['Chart.js sparkline','PostgreSQL aggregation','WebSocket real-time update']},
  {t:'WhatsApp-linked onboarding',s:'Low-smartphone users',b:'beta',
   info:'Full onboarding via WhatsApp messages. Stiv AI sends structured message sequences, collects responses, and writes to the database.',
   ui:'No in-app screen — this is a WhatsApp conversation flow. Stiv sends numbered menu options (Reply 1 for English, 2 for Swahili, 3 for Luganda). Each answer triggers the next question. At the end a confirmation message links to the platform.',
   tech:['WhatsApp Business API','Twilio WhatsApp','Stiv AI message flow','Webhook handler']},
  {t:'USSD onboarding',s:'Feature phones, zero data required',b:'beta',
   info:'Registration via USSD code for users with no smartphone. Menu-driven keypad navigation. Data synced when co-op leader connects online.',
   ui:'No in-app screen — standard USSD menu displayed on any phone. *123# opens the CrossGate menu. Numbered options navigate through each step. Max 182 characters per screen.',
   tech:["Africa's Talking USSD API",'Python USSD session handler','PostgreSQL offline sync']},
  {t:'Co-op leader account',s:'Manages up to 50 linked SMEs',b:'beta',
   info:'Special account type for co-operative leaders to onboard and manage up to 50 member SMEs from a single dashboard.',
   ui:'Screen: Co-op leader dashboard has an extra tab "My Members" showing a table of all linked SMEs with their onboarding status, compliance score, and last active date. Top-right button "Add member" opens a form to register a new SME under this co-op.',
   tech:['Parent-child account model (PostgreSQL)','Bulk document upload','Co-op admin view']},
  {t:'Abandonment re-engagement',s:'SMS or WhatsApp if user drops off',b:'beta',
   info:'If onboarding is not completed within 48 hours, Stiv AI sends a personalised re-engagement message with a deep link back to the exact step the user left at.',
   ui:'No in-app screen — triggered automatically. The message reads: "Hi [Name], you are 60% through your CrossGate setup. Tap here to continue: [link]". Sent via SMS or WhatsApp based on user preference.',
   tech:['Cron job','Twilio SMS','WhatsApp Business API','Stiv AI message generation']},
 ]},
 {id:'B',name:'SME Dashboard',phase:'alpha',price:2200000,color:'#1D9E75',cls:'n-teal',col:0,features:[
  {t:'Home screen readiness status',s:'Export readiness at a glance',b:'alpha',
   info:'Main SME landing screen. Shows readiness score, top 3 missing items, and a Stiv AI one-line daily briefing personalised to the SME.',
   ui:'Screen: Dashboard home. Top section: large circular progress ring showing readiness score (e.g. 62%) in green/amber/red depending on value. Below ring: "Top 3 things to do today" — three action cards each with an icon, a one-line task description, and an arrow button. Bottom: Stiv AI briefing card with avatar and a short message.',
   tech:['React circular progress (recharts RadialBar)','Stiv AI daily briefing (GPT-4o)','PostgreSQL aggregation']},
  {t:'Export readiness score',s:'0-100 score from documents + ESG + listings',b:'alpha',
   info:'Calculated from: completed certifications (40%), ESG questionnaire (30%), product listing quality (20%), profile completeness (10%). Stiv explains what is pulling the score down.',
   ui:'Component: Used across multiple screens. In the dashboard home it is the large ring. On the listing page it appears as a smaller horizontal bar with a label. Colour: red 0-40, amber 41-70, green 71-100. Tapping it opens a breakdown modal showing each category and its contribution.',
   tech:['Scoring algorithm (Node.js)','Stiv AI score explanation modal','React progress components']},
  {t:'Missing requirements list',s:'Plain-language explanation per gap',b:'alpha',
   info:'Every compliance gap is listed with a Stiv AI plain-language explanation and a direct action button.',
   ui:'Screen: "What you need" tab on the dashboard. Each item is a card with: a red warning icon, a bold title (e.g. "Food safety certificate missing"), a plain-language explanation (e.g. "To sell fish to the UK you need a HACCP certificate. Here is how to get one."), and a green "Start this" button.',
   tech:['Stiv AI explanation generation','PostgreSQL requirements table','React action cards']},
  {t:'Step-by-step compliance guide',s:'Prioritised to-do list by Stiv AI',b:'alpha',
   info:'Stiv AI generates a prioritised action list based on commodity type, target market, and current documents. Each step links to the relevant form or upload.',
   ui:'Screen: "My compliance journey" — a vertical numbered list. Each step has: a number badge, a title, a status pill (Not started / In progress / Done), and a "Go" button. Completed steps show a green tick and are greyed out. The current active step has a blue border and is expanded to show sub-tasks.',
   tech:['Stiv AI task generation','Commodity rules DB','React vertical stepper']},
  {t:'Document upload centre',s:'All compliance documents in one place',b:'alpha',
   info:'Central file hub for all documents. Stiv AI classifies uploads automatically and extracts key dates via OCR.',
   ui:'Screen: "My documents" tab. Grid of document cards, each showing: document type icon, name, upload date, status pill (Pending review / Approved / Expired). Top-right: "Upload document" button which opens a modal with a drag-and-drop zone and a document type dropdown. Expired documents have a red border.',
   tech:['S3/Cloudinary','AWS Textract OCR','Stiv AI classification','react-dropzone']},
  {t:'Document status tracker',s:'Pending, approved, expired per document',b:'alpha',
   info:'Tracks document lifecycle. Expiry dates monitored with 30-day alerts. Expired documents reduce the readiness score.',
   ui:'Component: Status pill on each document card. Colours: grey (pending), green (approved), red (expired), amber (expiring soon). Clicking a document card opens a detail panel showing: issuing body, certificate number, valid from/to dates, and the action log.',
   tech:['PostgreSQL status fields','Cron expiry checks','Stiv AI expiry alerts','React status pills']},
  {t:'OCR document data extraction',s:'Auto-reads uploaded certificates',b:'alpha',
   info:'On upload, OCR extracts certificate number, issuing body, validity dates, and covered commodities to auto-fill compliance fields.',
   ui:'After upload: a loading spinner for 2-3 seconds then a "We found the following details" panel appears with extracted fields pre-filled in green. User confirms or edits each field before saving.',
   tech:['AWS Textract','Tesseract.js fallback','Stiv AI field mapping']},
  {t:'Certificate checksum + validation',s:'SHA-256 tamper detection',b:'alpha',
   info:'Each certificate is hashed at upload. If ever altered or replaced, the hash mismatch is detected and admin is alerted.',
   ui:'No visible UI for the user — this runs in the background. Admin sees a "Certificate integrity" column in the document review panel showing a green shield (valid) or red shield (hash mismatch).',
   tech:['SHA-256 hashing (Node.js crypto)','PostgreSQL hash storage','Stiv AI fraud alert to admin']},
  {t:'Notification centre',s:'All alerts in one inbox',b:'alpha',
   info:'Unified notification drawer for all alert types. Real-time via WebSocket. Also sent via email and SMS.',
   ui:'Component: Bell icon in the top navigation bar with a red badge showing unread count. Clicking opens a right-side drawer listing notifications in reverse chronological order. Each notification has: an icon (type), a short message, a timestamp, and a "View" button. Unread notifications have a blue left border.',
   tech:['WebSocket (Socket.io)','PostgreSQL notifications table','SendGrid','Twilio SMS']},
  {t:'Product listing creation',s:'Name, qty, harvest date, storage, price',b:'alpha',
   info:'SME creates a structured product listing. Stiv AI validates fields and suggests improvements.',
   ui:'Screen: "Create listing" — a clean multi-field form. Fields: Product name (text), Commodity type (dropdown), Available quantity + unit (number + dropdown), Harvest/production date (date picker), Storage conditions (multi-select chips: Refrigerated, Dry, Frozen), Unit price + currency, Origin location (map pin). Right side panel: Stiv AI tips updating in real time as fields are filled.',
   tech:['React form','Google Maps origin pin','Stiv AI listing quality scorer','PostgreSQL listings table']},
  {t:'AI product description generator',s:'Stiv writes export-ready text',b:'alpha',
   info:'After basic fields are filled, Stiv generates a professional buyer-facing description. Target: 70-80% usable with minimal edits (Alpha 1 KPI).',
   ui:'Component: Below the listing form, a section titled "AI-generated description". Shows a text area pre-filled with Stiv\'s generated text. Below it: three buttons — "Looks good" (accepts), "Edit" (makes text editable), "Regenerate" (Stiv tries again). A quality indicator (star rating) shows admin-tracked usability.',
   tech:['Stiv AI (GPT-4o / Claude)','Prompt engineering per commodity','Admin correction panel']},
  {t:'Listing completion tracker',s:'Started vs finished listings',b:'alpha',
   info:'Tracks all listings. Stiv nudges SMEs with incomplete drafts older than 72 hours. Feeds the Alpha 1 KPI of 5 complete listings.',
   ui:'Screen: "My listings" tab. Two sections: "Complete" (published listings as green cards) and "In progress" (draft listings as amber cards with a % completion indicator and a "Continue" button). Top: summary bar showing X complete, Y in progress.',
   tech:['PostgreSQL listing_status','Stiv AI nudge messages','Admin KPI dashboard']},
  {t:'Saved drafts',s:'Auto-saves every 30 seconds',b:'alpha',
   info:'All forms auto-save as drafts. Stiv AI reminds user of old drafts at login.',
   ui:'Component: Subtle "Saved" indicator (grey text + tick) in the top-right of any form, updating every 30 seconds. On the dashboard home: a "Continue where you left off" banner appears if a draft is older than 1 hour.',
   tech:['Debounced API calls','PostgreSQL drafts table','Stiv AI draft reminder']},
  {t:'Multi-language toggle',s:'EN / SW / LG on all screens',b:'alpha',
   info:'Language toggle updates all UI text, Stiv responses, and notification copy instantly.',
   ui:'Component: Flag/language selector in the top navigation bar (three options: EN, SW, LG). Switching language triggers an instant UI reload without a full page refresh. Language preference saved to user profile.',
   tech:['i18next / react-i18next','Translation JSON files','Stiv AI multilingual responses']},
  {t:'Help button on every screen',s:'Opens Stiv AI overlay',b:'alpha',
   info:'Persistent help button opens a Stiv AI overlay that knows which screen the user is on. Auto-creates a helpdesk ticket if Stiv cannot resolve.',
   ui:'Component: Floating circular button bottom-right of every screen with a "?" icon. Tapping opens a chat overlay from the bottom (slide-up animation). Stiv greets the user and asks "What do you need help with on this screen?" The overlay has a close X at the top.',
   tech:['Stiv AI context-aware chat','React portal overlay','Helpdesk ticket auto-creation']},

// Feature prices: each feature's price = module.price / feature count (for deduction calculation)
// We track feature-level checked state
const featChecked = {};
MODS.forEach(m => {
  m.features.forEach((f,i) => {
    featChecked[m.id+'_'+i] = true;
  });
});

let currentBuild = 'alpha';
const modChecked = new Set(MODS.map(m=>m.id));

function buildRank(b){return b==='alpha'?0:b==='beta'?1:2;}
function featureVisible(f){
  if(currentBuild==='alpha' && f.b!=='alpha') return false;
  if(currentBuild==='beta' && buildRank(f.b)>1) return false;
  return true;
}
function modInScope(mod){
  return currentBuild==='full'||(currentBuild==='beta'&&buildRank(mod.phase)<=1)||(currentBuild==='alpha'&&mod.phase==='alpha');
}

function calcTotal(){
  let total = 0;
  MODS.forEach(m => {
    if(!modChecked.has(m.id)) return;
    const totalFeats = m.features.length;
    const pricePerFeat = m.price / totalFeats;
    m.features.forEach((f,i) => {
      if(featChecked[m.id+'_'+i]) total += pricePerFeat;
    });
  });
  return Math.round(total);
}

function renderSidebar(){
  const sb = document.getElementById('sb-scroll');
  sb.innerHTML = '';
  const phases = [
    {key:'alpha', label:'Alpha build', sub:'10,000,000 UGX'},
    {key:'beta',  label:'Beta additions', sub:'17,000,000 UGX'},
    {key:'full',  label:'Full scope additions', sub:'17,500,000 UGX'},
  ];
  phases.forEach(ph => {
    const modsInPhase = MODS.filter(m => m.phase === ph.key);
    const sec = document.createElement('div');
    sec.className = 'sb-phase';
    sec.innerHTML = ph.label + '<span class="sb-phase-price"> — ' + ph.sub + '</span>';
    sb.appendChild(sec);
    modsInPhase.forEach(m => {
      const locked = m.phase === 'alpha';
      const wrap = document.createElement('div');
      // Module header
      const hdr = document.createElement('div');
      hdr.className = 'mod-header';
      hdr.innerHTML = `<div class="mod-dot" style="background:${m.color}"></div><input class="mod-check" type="checkbox" id="mc_${m.id}" ${modChecked.has(m.id)?'checked':''} ${locked?'disabled':''} onclick="event.stopPropagation();toggleMod('${m.id}',this.checked)"><div class="mod-label">${m.name}</div><div class="mod-price">${(m.price/1000000).toFixed(1)}M</div><div class="mod-arrow" id="arr_${m.id}">&#9658;</div>`;
      hdr.addEventListener('click', () => toggleModExpand(m.id));
      wrap.appendChild(hdr);
      // Feature list
      const fl = document.createElement('div');
      fl.className = 'feat-list';
      fl.id = 'fl_' + m.id;
      m.features.forEach((f, fi) => {
        const key = m.id + '_' + fi;
        const featLocked = locked; // alpha features locked
        const row = document.createElement('div');
        row.className = 'feat-row';
        const bc = BADGE.alpha;
        const badgeCls = f.b === 'alpha' ? 'b-alpha' : f.b === 'beta' ? 'b-beta' : 'b-full';
        row.innerHTML = `<input class="feat-check" type="checkbox" id="fc_${key}" ${featChecked[key]?'checked':''} ${featLocked?'disabled':''} onchange="toggleFeat('${key}',this.checked)"><label class="feat-label" for="fc_${key}">${f.t}</label><span class="feat-badge ${badgeCls}">${f.b}</span>`;
        fl.appendChild(row);
      });
      wrap.appendChild(fl);
      sb.appendChild(wrap);
    });
  });
  updateTotal();
}

function toggleModExpand(id){
  const fl = document.getElementById('fl_' + id);
  const arr = document.getElementById('arr_' + id);
  if(!fl) return;
  fl.classList.toggle('open');
  arr.classList.toggle('open');
}

function toggleMod(id, on){
  if(on) modChecked.add(id); else modChecked.delete(id);
  renderCanvas();
  updateTotal();
}

function toggleFeat(key, on){
  featChecked[key] = on;
  updateTotal();
  renderCanvas();
}

function updateTotal(){
  const total = calcTotal();
  document.getElementById('total-val').textContent = total.toLocaleString() + ' UGX';
  const builds = [];
  if(MODS.some(m => modChecked.has(m.id) && m.phase==='alpha')) builds.push('Alpha');
  if(MODS.some(m => modChecked.has(m.id) && m.phase==='beta')) builds.push('+ Beta');
  if(MODS.some(m => modChecked.has(m.id) && m.phase==='full')) builds.push('+ Full');
  document.getElementById('total-build').textContent = builds.join(' ') || 'None selected';
}

function setBuild(b, btn){
  currentBuild = b;
  document.querySelectorAll('.bbtn').forEach(x => x.classList.remove('on'));
  btn.classList.add('on');
  renderSidebar();
  renderCanvas();
}

function openInfo(modId, featIdx){
  const mod = MODS.find(m => m.id === modId);
  if(!mod) return;
  const f = mod.features[featIdx];
  if(!f) return;
  document.getElementById('info-title').textContent = f.t;
  const body = document.getElementById('info-body');
  body.innerHTML = '';
  // Phase + module
  const ph = document.createElement('div');
  ph.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap';
  ph.innerHTML = `<span class="info-badge ${f.b==='alpha'?'b-alpha':f.b==='beta'?'b-beta':'b-full'}">${f.b.charAt(0).toUpperCase()+f.b.slice(1)} build</span><span style="font-size:10px;color:#5f5e5a">Module: ${mod.name}</span>`;
  body.appendChild(ph);
  // What it does
  const d1 = document.createElement('div');
  d1.innerHTML = `<div class="info-sec-title">What this feature does</div><div class="info-text">${f.info}</div>`;
  body.appendChild(d1);
  // UI notes
  if(f.ui){
    const d2 = document.createElement('div');
    d2.innerHTML = `<div class="info-sec-title">UI / screen layout notes for the developer</div><div class="ui-box">${f.ui}</div>`;
    body.appendChild(d2);
  }
  // Tech
  if(f.tech && f.tech.length){
    const d3 = document.createElement('div');
    d3.innerHTML = `<div class="info-sec-title">Recommended technologies and tools</div><div>${f.tech.map(t=>`<span class="tech-tag">${t}</span>`).join('')}</div>`;
    body.appendChild(d3);
  }
  // Stiv AI role
  const d4 = document.createElement('div');
  const stivInvolved = f.info.includes('Stiv') || f.ui.includes('Stiv');
  d4.innerHTML = `<div class="info-sec-title">Stiv AI involvement</div><div class="info-text">${stivInvolved ? 'Stiv AI is actively involved in this feature as described above.' : 'This is a structural or infrastructure feature. Stiv AI is not the primary actor but may reference data from this module.'}</div>`;
  body.appendChild(d4);
  document.getElementById('info-panel').classList.add('open');
  document.getElementById('info-overlay').classList.add('open');
}

function closeInfo(){
  document.getElementById('info-panel').classList.remove('open');
  document.getElementById('info-overlay').classList.remove('open');
}

function renderCanvas(){
  const canvas = document.getElementById('canvas');
  document.querySelectorAll('.node,.col-head-el').forEach(el => el.remove());
  COL_HEADS.forEach(h => {
    const d = document.createElement('div');
    d.className = 'col-head-el';
    d.style.cssText = `position:absolute;left:${h.x}px;top:0;width:${NW}px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;text-align:center;padding-bottom:5px;border-bottom:2px solid ${h.color};color:${h.color}`;
    d.textContent = h.label;
    canvas.appendChild(d);
  });
  const colY = [28,28,28,28];
  const nodeReg = {};
  MODS.forEach(mod => {
    if(!modInScope(mod) || !modChecked.has(mod.id)) return;
    mod.features.forEach((f, fi) => {
      const key = mod.id + '_' + fi;
      const vis = featureVisible(f) && featChecked[key];
      const y = colY[mod.col];
      const div = document.createElement('div');
      div.className = 'node ' + mod.cls;
      div.id = 'nd_' + key;
      div.style.cssText = `left:${COLX[mod.col]}px;top:${y}px;`;
      const badgeCls = f.b==='alpha'?'b-alpha':f.b==='beta'?'b-beta':'b-full';
      div.innerHTML = `<div class="node-title">${f.t}</div><div class="node-sub">${f.s}</div><span class="nbadge ${badgeCls}">${f.b}</span><div class="info-btn" onclick="openInfo('${mod.id}',${fi})" title="Feature detail">i</div>`;
      if(!vis) div.classList.add('hidden');
      canvas.appendChild(div);
      nodeReg[key] = {x:COLX[mod.col], y, col:mod.col, vis};
      if(vis) colY[mod.col] += NH + GAP;
    });
    if(mod.features.some((f,fi) => featureVisible(f) && featChecked[mod.id+'_'+fi])) colY[mod.col] += 12;
  });
  const maxH = Math.max(...colY) + 40;
  canvas.style.minHeight = maxH + 'px';
  const svg = document.getElementById('svgl');
  svg.setAttribute('width','990');
  svg.setAttribute('height', maxH);
  svg.innerHTML = `<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;
  // Vertical flow lines per column
  const cols = [[],[],[],[]];
  Object.entries(nodeReg).forEach(([k,n]) => { if(n.vis) cols[n.col].push({...n,k}); });
  const colColors = ['#1D9E75','#378ADD','#7F77DD','#D85A30'];
  cols.forEach((colNodes, ci) => {
    const sorted = colNodes.sort((a,b) => a.y - b.y);
    sorted.forEach((n,i) => {
      if(i===0) return;
      const prev = sorted[i-1];
      const x = COLX[ci] + NW/2;
      const y1 = prev.y + NH;
      const y2 = n.y;
      if(y2 <= y1) return;
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',x); line.setAttribute('y1',y1);
      line.setAttribute('x2',x); line.setAttribute('y2',y2);
      line.setAttribute('stroke', colColors[ci]);
      line.setAttribute('stroke-width','1.5');
      line.setAttribute('stroke-opacity','0.28');
      line.setAttribute('marker-end','url(#ar)');
      svg.appendChild(line);
    });
  });
  // Cross-column connections
  const CROSS = [
    {from:'D_4', to:'E_3', color:'#639922'},
    {from:'D_7', to:'F_2', color:'#1D9E75'},
    {from:'G_3', to:'E_3', color:'#D85A30'},
    {from:'H_2', to:'B_9', color:'#D85A30'},
    {from:'L_1', to:'H_3', color:'#1D9E75'},
  ];
  CROSS.forEach(cr => {
    const fn = nodeReg[cr.from];
    const tn = nodeReg[cr.to];
    if(!fn || !tn || !fn.vis || !tn.vis) return;
    const x1 = fn.x + NW, y1 = fn.y + NH/2;
    const x2 = tn.x, y2 = tn.y + NH/2;
    const mx = (x1+x2)/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1} ${y1} C${mx} ${y1},${mx} ${y2},${x2} ${y2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', cr.color);
    path.setAttribute('stroke-width','1.2');
    path.setAttribute('stroke-opacity','0.4');
    path.setAttribute('stroke-dasharray','5 3');
    path.setAttribute('marker-end','url(#ar)');
    svg.appendChild(path);
  });
}

renderSidebar();
renderCanvas();
</script>
