    /* Page loader */

<script>
// ─────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────
function safe(str) { return str || ''; }
function safeHtml(str) {
  if (!str) return '';
  return String(str).replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function safeRich(str) {
  if (!str) return '';
  return String(str)
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/&lt;strong&gt;/g, '<strong>')
    .replace(/&lt;\/strong&gt;/g, '</strong>')
    .replace(/&lt;em&gt;/g, '<em>')
    .replace(/&lt;\/em&gt;/g, '</em>')
    .replace(/&lt;br&gt;/g, '<br>');
}

// Get slug from URL: page.html?slug=about-us  OR  index.html → "home"
function getSlug() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  if (slug) return slug;
  // index.html with no param = home
  if (window.location.pathname.endsWith('index.html') || window.location.pathname === '/') return 'home';
  return 'home';
}

// ─────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────
async function boot() {
  const slug = getSlug();
  try {
    const [pageSnap, headerSnap, footerSnap] = await Promise.all([
      db.collection('pages').doc(slug).get(),
      db.collection('site-settings').doc('header').get(),
      db.collection('site-settings').doc('footer').get()
    ]);

    const pageData   = pageSnap.exists   ? pageSnap.data()   : null;
    const headerData = headerSnap.exists ? headerSnap.data() : {};
    const footerData = footerSnap.exists ? footerSnap.data() : {};

    if (!pageData) {
      document.getElementById('sections-root').innerHTML =
        `<div style="padding:100px 40px; text-align:center; color:#999;">Page not found: <strong>${slug}</strong></div>`;
    } else {
      // Set page meta
      document.title = pageData.title ? `${pageData.title} | Crossgates` : 'Crossgates';
      if (pageData.meta) {
        const m = document.createElement('meta');
        m.name = 'description'; m.content = pageData.meta;
        document.head.appendChild(m);
      }
      // Render sections
      renderSections(pageData.sections || []);
    }

    renderNav(headerData);
    renderFooter(footerData);

    // Init Webflow nav + interactions after render
setTimeout(() => {
  initNav();
  initVideoModals();
  initLottie();
  if (window.Webflow) {
    window.Webflow.destroy();
    window.Webflow.ready();
    window.Webflow.require('navbar').ready();
  }
}, 150);

    // Fade in
    const loader = document.getElementById('page-loader');
    const wrap   = document.getElementById('page-wrap');
    loader.classList.add('fade-out');

    setTimeout(() => loader.remove(), 500);

    // Init swiper for testimonials if present
    setTimeout(() => initTestimonialsSwiper(), 200);

  } catch(err) {
    console.error('CMS boot error:', err);
    document.getElementById('page-loader').innerHTML =
      `<div style="color:#f87171; font-family:monospace; padding:40px;">Error loading page: ${err.message}</div>`;
  }
}

// ─────────────────────────────────────────
// RENDER SECTIONS
// ─────────────────────────────────────────
function renderSections(sections) {
  const sorted = [...sections].sort((a, b) => (a.order || 0) - (b.order || 0));
  const html = sorted.map(s => renderSection(s)).join('');
  document.getElementById('sections-root').innerHTML = html;
}

function renderSection(section) {
  const d = section.data || {};
  switch(section.type) {
    case 'hero':             return renderHero(d);
    case 'features':         return renderFeatures(d);
    case 'metrics':          return renderMetrics(d);
    case 'solutions':        return renderSolutions(d);
    case 'testimonials':     return renderTestimonials(d);
    case 'outcomes':         return renderOutcomes(d);
    case 'blog':             return renderBlog(d);
    case 'faq':              return renderFaq(d);
    case 'cta':              return renderCta(d);
    case 'about':            return renderAbout(d);
    case 'history':          return renderHistory(d);
    case 'team':             return renderTeam(d);
    case 'problems':         return renderProblems(d);
    case 'solution-hero':    return renderSolutionHero(d);
    case 'solution-features':return renderSolutionFeatures(d);
    case 'benefits':         return renderBenefits(d);
    case 'compare':          return renderCompare(d);
    case 'request-demo':     return renderRequestDemo(d);
    case 'metrics-v2':       return renderMetricsV2(d);
    default:                 return '';
  }
}

function getYoutubeEmbed(url) {
  if (!url) return '';
  // YouTube
  const m = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (m) return `https://www.youtube.com/embed/${m[1]}?autoplay=1&rel=0`;
  // Local or direct video file — not a YouTube URL
  return null;
}

// ─────────────────────────────────────────
// NAV INTERACTIONS (Webflow-style)
// ─────────────────────────────────────────
function initNav() {
  // Webflow nav script if available
  if (window.Webflow && window.Webflow.ready) {
    window.Webflow.ready();
    return;
  }

  // Lightweight fallback dropdown handler
  document.querySelectorAll('.w-dropdown-toggle').forEach(toggle => {
    toggle.addEventListener('click', function(e) {
      e.stopPropagation();
      const dropdown = this.closest('.w-dropdown');
      const list = dropdown.querySelector('.w-dropdown-list');
      const isOpen = this.getAttribute('aria-expanded') === 'true';

      // Close all others
      document.querySelectorAll('.w-dropdown-toggle').forEach(t => {
        t.setAttribute('aria-expanded', 'false');
        t.closest('.w-dropdown')?.querySelector('.w-dropdown-list')?.classList.remove('w--open');
      });

      if (!isOpen) {
        this.setAttribute('aria-expanded', 'true');
        list?.classList.add('w--open');
      }
    });
  });

  // Close on outside click
  document.addEventListener('click', () => {
    document.querySelectorAll('.w-dropdown-toggle').forEach(t => {
      t.setAttribute('aria-expanded', 'false');
      t.closest('.w-dropdown')?.querySelector('.w-dropdown-list')?.classList.remove('w--open');
    });
  });

  // Mobile nav toggle
  const navBtn = document.querySelector('.w-nav-button');
  const navMenu = document.querySelector('.nav_menu_wrap');
  const overlay = document.querySelector('.w-nav-overlay');
  if (navBtn && navMenu) {
    navBtn.addEventListener('click', () => {
      const isOpen = navBtn.getAttribute('aria-expanded') === 'true';
      navBtn.setAttribute('aria-expanded', String(!isOpen));
      navBtn.classList.toggle('w--open', !isOpen);
      navMenu.classList.toggle('w--open', !isOpen);
      if (overlay) {
        overlay.style.display = !isOpen ? 'block' : 'none';
        if (!isOpen) {
          navMenu.style.display = 'block';
          setTimeout(() => { navMenu.style.height = navMenu.scrollHeight + 'px'; }, 10);
        } else {
          navMenu.style.height = '0';
        }
      }
    });
  }
}

// ─────────────────────────────────────────
// TESTIMONIALS SWIPER
// ─────────────────────────────────────────
function initTestimonialsSwiper() {
  const wrap = document.querySelector('.testimonials_slider_wrap');
  if (!wrap || !window.Swiper) return;
  const quoteEl = wrap.querySelector('.testimonials_slider_quote');
  if (!quoteEl) return;
  new Swiper(quoteEl, {
    slidesPerView: 1,
    loop: true,
    effect: 'fade',
    allowTouchMove: false,
    fadeEffect: { crossFade: true },
    navigation: {
      nextEl: wrap.querySelector('.is-next'),
      prevEl: wrap.querySelector('.is-prev')
    }
  });
}


// ─────────────────────────────────────────
// VIDEO MODALS
// ─────────────────────────────────────────
function initVideoModals() {
  document.querySelectorAll('.video_modal_trigger').forEach(trigger => {
    // Grab modal once and store it — works even after appendChild moves it
    const modal = trigger.closest('.video_modal_wrap').querySelector('.video_modal_content');
    if (!modal) return;

    // Move to body once on init, not on every click
    document.body.appendChild(modal);

    trigger.addEventListener('click', function() {
      modal.style.display = 'flex';
      setTimeout(() => { modal.style.opacity = '1'; }, 10);
      const iframe = modal.querySelector('iframe');
      if (iframe && iframe.dataset.src) iframe.setAttribute('src', iframe.dataset.src);
      const video = modal.querySelector('video');
      if (video) video.play();
    });

    // Close on background click
    modal.addEventListener('click', function(e) {
      if (e.target === modal || e.target.classList.contains('video_modal_bg')) {
        closeModal(modal);
      }
    });

    // Close button
    const closeBtn = modal.querySelector('.video_modal_close');
    if (closeBtn) {
      closeBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        closeModal(modal);
      });
    }
  });
}

function initLottie() {
  if (!window.lottie) return;
  document.querySelectorAll('[data-animation-type="lottie"]').forEach(el => {
    if (el.dataset.state === 'playing') return; // already initialized
    const src = el.dataset.src || el.dataset.defaultSrc;
    if (!src) return;
    const anim = lottie.loadAnimation({
      container: el,
      renderer: el.dataset.renderer || 'svg',
      loop: el.dataset.loop === '1',
      autoplay: el.dataset.autoplay === '1',
      path: src
    });
    el.dataset.state = 'playing';
  });
}


function closeModal(modal) {
  modal.style.opacity = '0';
  setTimeout(() => { modal.style.display = 'none'; }, 300);
  const iframe = modal.querySelector('iframe');
  if (iframe) iframe.removeAttribute('src');
  const video = modal.querySelector('video');
  if (video) { video.pause(); video.currentTime = 0; }
}
