<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Empowerment IGNITE — The Sanctum</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #05030a; overflow: hidden; font-family: "Cormorant Garamond", "Cormorant", "Times New Roman", Georgia, serif; color: #f5e7c4; }
  #c { display: block; width: 100vw; height: 100vh; }

  /* in-room UI overlay */
  #ui {
    position: fixed; inset: 0; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 32px 24px; text-align: center; z-index: 10;
    transition: opacity 0.6s ease;
  }
  #title-block { letter-spacing: 0.42em; font-weight: 300; font-size: clamp(11px, 1.5vw, 14px); color: #c5a366; text-transform: uppercase; opacity: 0; animation: fadeIn 2.6s ease 0.6s forwards; }
  #title-block .name { font-size: clamp(22px, 3.2vw, 34px); font-weight: 400; letter-spacing: 0.32em; margin-top: 6px; color: #d8b675; }
  #hint { font-size: 12px; letter-spacing: 0.36em; text-transform: uppercase; color: #8b6f3b; opacity: 0; animation: fadeIn 2.4s ease 2.4s forwards; }

  #haven-label {
    position: fixed; bottom: 18%; left: 50%; transform: translateX(-50%);
    font-size: clamp(20px, 2.4vw, 28px); letter-spacing: 0.28em; color: #f0d99c;
    text-shadow: 0 0 24px rgba(0,0,0,0.85), 0 0 32px rgba(255, 160, 70, 0.35);
    opacity: 0; transition: opacity 0.6s ease; pointer-events: none; z-index: 11;
  }
  #haven-label.show { opacity: 1; }

  #back-btn {
    position: fixed; top: 24px; right: 24px;
    pointer-events: auto; z-index: 12;
    background: rgba(20, 14, 8, 0.55); backdrop-filter: blur(8px);
    border: 1px solid rgba(180, 145, 80, 0.35);
    color: #d8b675; padding: 10px 18px;
    letter-spacing: 0.28em; font-size: 11px; text-transform: uppercase;
    font-family: inherit; cursor: pointer;
    opacity: 0; transform: translateY(-8px); transition: opacity 0.35s ease, transform 0.35s ease;
  }
  #back-btn.show { opacity: 1; transform: translateY(0); }
  #back-btn:hover { background: rgba(50, 32, 14, 0.7); color: #fff; }

  /* loader — text reveal from the PDF */
  #loader {
    position: fixed; inset: 0; background: radial-gradient(circle at center, #0c0710 0%, #050308 70%);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    transition: opacity 1.4s ease;
  }
  #loader.hide { opacity: 0; pointer-events: none; }
  #loader-inner {
    max-width: 760px; width: 88%; text-align: center;
    color: #d8b675;
  }
  #loader-mark {
    letter-spacing: 0.5em; font-size: 11px; text-transform: uppercase; color: #7a5d2c;
    margin-bottom: 14px;
    animation: dim 4s ease-in-out infinite;
  }
  #loader-name {
    font-size: clamp(22px, 3.5vw, 34px); letter-spacing: 0.3em; color: #e9c987; font-weight: 400;
    margin-bottom: 46px;
  }
  #loader-line {
    font-style: italic; font-size: clamp(18px, 2.4vw, 26px); line-height: 1.55;
    color: #efd9a4; min-height: 4em;
    text-shadow: 0 0 18px rgba(180,130,60,0.25);
    transition: opacity 1.2s ease;
  }
  #loader-bar {
    margin-top: 56px;
    width: 60%; max-width: 320px; height: 1px;
    background: rgba(150, 115, 60, 0.18); margin-left: auto; margin-right: auto;
    position: relative; overflow: hidden;
  }
  #loader-bar::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, #d8b675, transparent);
    transform: translateX(-100%);
    animation: barSlide 2.4s ease-in-out infinite;
  }
  @keyframes barSlide { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  @keyframes dim { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
  @keyframes fadeIn { to { opacity: 1; } }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="title-block">
    <div>Empowerment</div>
    <div class="name">IGNITE</div>
  </div>
  <div id="hint">Click a mirror to draw closer</div>
</div>
<div id="haven-label"></div>
<button id="back-btn">Return to the room</button>

<div id="loader">
  <div id="loader-inner">
    <div id="loader-mark">Empowerment</div>
    <div id="loader-name">IGNITE</div>
    <div id="loader-line">Look in the mirror.</div>
    <div id="loader-bar"></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* =========================================================================
   EMPOWERMENT IGNITE — THE SANCTUM   (revised: gentler light + image mirrors)
   ========================================================================= */

/* ---------- loader: cycle key lines from the PDF blueprint -------------- */
const LOADER_LINES = [
  "Look in the mirror.",
  "What do you see?",
  "When I look back, I do not just see what I went through —",
  "I see what shaped me.",
  "Time is moving, whether we use it or not.",
  "Do I keep going like this… or do I rise?",
  "This is not just a website.",
  "This is a journey.",
  "This is a mirror.",
  "This is a place where people remember who they are.",
  "Come walk the journey with me."
];
const loaderLine = document.getElementById('loader-line');
let loaderIdx = 0;
function loaderTick() {
  loaderLine.style.opacity = '0';
  setTimeout(() => {
    loaderLine.textContent = LOADER_LINES[loaderIdx % LOADER_LINES.length];
    loaderLine.style.opacity = '1';
    loaderIdx++;
  }, 600);
}
loaderTick();
const loaderInterval = setInterval(loaderTick, 2600);

/* ---------- havens ----------------------------------------------------- */
const HAVENS = [
  { name: 'Introduction',     sub: 'Empowerment IGNITE', edge: 0xff8a3c, img: 'kitchen.webp' },
  { name: 'Home Learning',    sub: 'Haven',              edge: 0xffa860, img: null },
  { name: 'Clarity',          sub: 'Haven',              edge: 0xeae0c2, img: null },
  { name: 'Still Water',      sub: 'Haven',              edge: 0xa7c8d8, img: null },
  { name: 'Return to Self',   sub: 'Haven',              edge: 0xf3a877, img: 'nostalgia.jpg' },
  { name: 'Healing',          sub: 'Haven',              edge: 0xf4cf9b, img: null },
  { name: 'The Light Within', sub: 'Mirrors',            edge: 0xffe9b6, img: null }
];

/* ---------- renderer / scene / camera ---------------------------------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.72;     // ↓ much darker base exposure
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05030a, 0.045);
scene.background = new THREE.Color(0x05030a);

const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.05, 200);
const CAM_DEFAULT_POS = new THREE.Vector3(0, 1.7, 8.4);
const CAM_DEFAULT_TARGET = new THREE.Vector3(0, 1.85, -2);
camera.position.copy(CAM_DEFAULT_POS);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.075;
controls.target.copy(CAM_DEFAULT_TARGET);
controls.minDistance = 1.5;
controls.maxDistance = 11;
controls.maxPolarAngle = Math.PI * 0.58;
controls.minPolarAngle = 0.35;
controls.minAzimuthAngle = -Math.PI * 0.42;
controls.maxAzimuthAngle =  Math.PI * 0.42;
controls.enablePan = false;
controls.rotateSpeed = 0.55;
controls.zoomSpeed = 0.6;

/* ---------- IBL environment ------------------------------------------- */
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.06).texture;

/* ---------- texture helpers ------------------------------------------- */
function makeCanvas(w, h, draw) {
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  draw(cv.getContext('2d'), cv);
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}
function noise(ctx, w, h, density, color, alpha=0.06) {
  ctx.fillStyle = color;
  for (let i = 0; i < density; i++) {
    const x = Math.random() * w, y = Math.random() * h;
    const r = Math.random() * 1.5 + 0.2;
    ctx.globalAlpha = alpha * Math.random();
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* parquet wood floor */
const floorTex = makeCanvas(1024, 1024, (g, cv) => {
  const planks = 6;
  const pw = cv.width / planks, ph = cv.height / 4;
  for (let py = 0; py < 4; py++) {
    const offset = (py % 2) * pw * 0.5;
    for (let px = 0; px < planks + 1; px++) {
      const x = px * pw - offset, y = py * ph;
      const base = 24 + Math.random() * 18;
      g.fillStyle = `rgb(${base+14},${base+8},${base})`;
      g.fillRect(x, y, pw, ph);
      const grad = g.createLinearGradient(0, y, 0, y + ph);
      grad.addColorStop(0, 'rgba(255,210,160,0.05)');
      grad.addColorStop(0.5, 'rgba(0,0,0,0.22)');
      grad.addColorStop(1, 'rgba(255,210,160,0.03)');
      g.fillStyle = grad; g.fillRect(x, y, pw, ph);
      for (let s = 0; s < 14; s++) {
        g.strokeStyle = `rgba(0,0,0,${0.08 + Math.random()*0.08})`;
        g.lineWidth = 0.4 + Math.random();
        g.beginPath();
        g.moveTo(x, y + Math.random()*ph);
        g.bezierCurveTo(x+pw*0.3, y+Math.random()*ph, x+pw*0.6, y+Math.random()*ph, x+pw, y+Math.random()*ph);
        g.stroke();
      }
      g.strokeStyle = 'rgba(0,0,0,0.5)'; g.lineWidth = 1.2; g.strokeRect(x, y, pw, ph);
    }
  }
  noise(g, cv.width, cv.height, 6000, '#000', 0.08);
});
floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(4, 3);

/* burgundy damask wallpaper */
const wallTex = makeCanvas(768, 768, (g, cv) => {
  const grad = g.createLinearGradient(0, 0, 0, cv.height);
  grad.addColorStop(0, '#2a0f0d'); grad.addColorStop(0.5, '#1a0908'); grad.addColorStop(1, '#100404');
  g.fillStyle = grad; g.fillRect(0, 0, cv.width, cv.height);
  g.globalAlpha = 0.04; g.fillStyle = '#a8842c';
  for (let y = 0; y < cv.height; y += 96) {
    for (let x = 0; x < cv.width; x += 96) {
      const ox = (Math.floor(y/96) % 2) * 48;
      g.beginPath(); g.ellipse(x + ox + 48, y + 48, 28, 18, 0, 0, Math.PI*2); g.fill();
      g.beginPath(); g.ellipse(x + ox + 48, y + 48, 12, 32, Math.PI/2, 0, Math.PI*2); g.fill();
    }
  }
  g.globalAlpha = 1;
  noise(g, cv.width, cv.height, 8000, '#000', 0.05);
});
wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
wallTex.repeat.set(2, 1);

/* ceiling */
const ceilTex = makeCanvas(512, 512, (g, cv) => {
  g.fillStyle = '#120c08'; g.fillRect(0,0,cv.width,cv.height);
  const cx = cv.width/2, cy = cv.height/2;
  for (let i = 0; i < 8; i++) {
    g.globalAlpha = 0.30 - i*0.03;
    g.fillStyle = `rgb(${100-i*8},${78-i*6},${36})`;
    g.beginPath(); g.arc(cx, cy, 140 - i*15, 0, Math.PI*2); g.fill();
  }
  g.globalAlpha = 1;
  g.strokeStyle = '#4a3110'; g.lineWidth = 1.5; g.globalAlpha = 0.45;
  for (let i = 0; i < 12; i++) {
    const a = (i/12) * Math.PI * 2;
    g.beginPath(); g.moveTo(cx, cy);
    g.bezierCurveTo(cx + Math.cos(a)*80, cy + Math.sin(a)*80,
                    cx + Math.cos(a)*180, cy + Math.sin(a)*100,
                    cx + Math.cos(a)*200, cy + Math.sin(a)*200);
    g.stroke();
  }
  g.globalAlpha = 1;
  noise(g, cv.width, cv.height, 4000, '#000', 0.06);
});

/* abstract painting (decor) */
function makePaintingTex() {
  return makeCanvas(512, 640, (g, cv) => {
    const grad = g.createLinearGradient(0,0,cv.width,cv.height);
    grad.addColorStop(0, '#2e1f0f'); grad.addColorStop(0.6, '#3e2718'); grad.addColorStop(1, '#0e0703');
    g.fillStyle = grad; g.fillRect(0,0,cv.width,cv.height);
    for (let i = 0; i < 80; i++) {
      g.globalAlpha = 0.04 + Math.random()*0.07;
      g.fillStyle = `hsl(${20+Math.random()*30},${30+Math.random()*40}%,${15+Math.random()*30}%)`;
      g.beginPath();
      g.ellipse(Math.random()*cv.width, Math.random()*cv.height, 30+Math.random()*60, 5+Math.random()*15, Math.random()*Math.PI, 0, Math.PI*2);
      g.fill();
    }
    g.globalAlpha = 1;
    g.fillStyle = 'rgba(15,8,4,0.4)';
    g.beginPath(); g.ellipse(cv.width/2, cv.height*0.35, 70, 90, 0, 0, Math.PI*2); g.fill();
    g.beginPath(); g.ellipse(cv.width/2, cv.height*0.7, 130, 200, 0, 0, Math.PI*2); g.fill();
    noise(g, cv.width, cv.height, 4000, '#000', 0.06);
  });
}

/* ----- procedural "place" scenes for the mirrors without uploaded imgs - */
function sceneLibrary() {
  return makeCanvas(512, 640, (g, c) => {
    const grad = g.createLinearGradient(0,0,0,c.height);
    grad.addColorStop(0, '#2a1c0c'); grad.addColorStop(1, '#0a0604');
    g.fillStyle = grad; g.fillRect(0,0,c.width,c.height);
    for (let s = 0; s < 5; s++) {
      const y = 80 + s * 110;
      g.fillStyle = '#150a04'; g.fillRect(0, y+92, c.width, 8);
      for (let b = 0; b < 9; b++) {
        const x = b * 58 + Math.random()*8;
        const w = 44 + Math.random()*12;
        const h = 70 + Math.random()*22;
        g.fillStyle = `hsl(${15+Math.random()*40},${35+Math.random()*30}%,${10+Math.random()*15}%)`;
        g.fillRect(x, y + (92 - h), w, h);
        g.fillStyle = 'rgba(160,120,60,0.35)';
        g.fillRect(x+w*0.2, y+92-h*0.7, w*0.6, 2);
      }
    }
    // warm desk lamp glow
    const rg = g.createRadialGradient(c.width*0.78, c.height*0.78, 8, c.width*0.78, c.height*0.78, 220);
    rg.addColorStop(0, 'rgba(255,200,120,0.55)'); rg.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = rg; g.fillRect(0,0,c.width,c.height);
  });
}
function sceneWater() {
  return makeCanvas(512, 640, (g, c) => {
    const grad = g.createLinearGradient(0,0,0,c.height);
    grad.addColorStop(0, '#1f3340'); grad.addColorStop(0.45, '#11202b'); grad.addColorStop(0.55, '#0a1620'); grad.addColorStop(1, '#040c14');
    g.fillStyle = grad; g.fillRect(0,0,c.width,c.height);
    // moon
    const mg = g.createRadialGradient(c.width/2, c.height*0.28, 8, c.width/2, c.height*0.28, 70);
    mg.addColorStop(0, 'rgba(232,236,210,0.95)'); mg.addColorStop(1, 'rgba(60,60,80,0)');
    g.fillStyle = mg; g.fillRect(0,0,c.width,c.height);
    // ripples
    for (let i = 0; i < 70; i++) {
      g.strokeStyle = `rgba(180,200,220,${0.04 + Math.random()*0.10})`;
      g.lineWidth = 0.4 + Math.random()*0.6;
      const y = c.height*0.55 + Math.random()*(c.height*0.4);
      g.beginPath(); g.moveTo(0, y);
      for (let x = 0; x < c.width; x += 18) g.lineTo(x, y + Math.sin(x*0.06)*1.5);
      g.stroke();
    }
    // moon reflection
    const rg = g.createLinearGradient(c.width/2 - 28, 0, c.width/2 + 28, 0);
    rg.addColorStop(0, 'rgba(0,0,0,0)'); rg.addColorStop(0.5, 'rgba(225,225,200,0.45)'); rg.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = rg; g.fillRect(c.width/2-28, c.height*0.55, 56, c.height*0.45);
  });
}
function sceneDawn() {
  return makeCanvas(512, 640, (g, c) => {
    const grad = g.createLinearGradient(0,0,0,c.height);
    grad.addColorStop(0, '#e8b078'); grad.addColorStop(0.4, '#c97a5a'); grad.addColorStop(0.7, '#5c2c34'); grad.addColorStop(1, '#1c0e10');
    g.fillStyle = grad; g.fillRect(0,0,c.width,c.height);
    const rg = g.createRadialGradient(c.width/2, c.height*0.42, 4, c.width/2, c.height*0.42, 180);
    rg.addColorStop(0, 'rgba(255,240,200,0.85)'); rg.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = rg; g.fillRect(0,0,c.width,c.height);
    // tree silhouettes
    g.fillStyle = '#0d0604';
    for (let i = 0; i < 12; i++) {
      const x = i * 50 + Math.random()*30;
      const h = 40 + Math.random()*60;
      g.beginPath();
      g.moveTo(x, c.height*0.66);
      g.bezierCurveTo(x-15, c.height*0.66-h*0.7, x-5, c.height*0.66-h, x, c.height*0.66-h);
      g.bezierCurveTo(x+5, c.height*0.66-h, x+15, c.height*0.66-h*0.7, x+30, c.height*0.66);
      g.fill();
    }
    g.fillStyle = '#070302'; g.fillRect(0, c.height*0.66, c.width, c.height*0.34);
  });
}
function sceneCosmic() {
  return makeCanvas(512, 640, (g, c) => {
    g.fillStyle = '#05030f'; g.fillRect(0,0,c.width,c.height);
    for (let i = 0; i < 7; i++) {
      const rg = g.createRadialGradient(
        c.width * (0.2 + Math.random()*0.6),
        c.height * (0.2 + Math.random()*0.6),
        20,
        c.width * (0.2 + Math.random()*0.6),
        c.height * (0.2 + Math.random()*0.6),
        130 + Math.random()*120
      );
      const hue = 30 + Math.random()*30;
      rg.addColorStop(0, `hsla(${hue},75%,55%,0.28)`); rg.addColorStop(1, 'rgba(0,0,0,0)');
      g.fillStyle = rg; g.fillRect(0,0,c.width,c.height);
    }
    for (let i = 0; i < 520; i++) {
      g.fillStyle = `rgba(${210+Math.random()*45},${205+Math.random()*40},${180+Math.random()*70},${0.3+Math.random()*0.6})`;
      const x = Math.random()*c.width, y = Math.random()*c.height;
      const s = Math.random()*1.4 + 0.3;
      g.fillRect(x, y, s, s);
    }
    const rg = g.createRadialGradient(c.width/2, c.height/2, 6, c.width/2, c.height/2, 90);
    rg.addColorStop(0, 'rgba(255,238,180,0.85)'); rg.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = rg; g.fillRect(0,0,c.width,c.height);
  });
}
function sceneClassroom() {
  return makeCanvas(512, 640, (g, c) => {
    const grad = g.createLinearGradient(0,0,0,c.height);
    grad.addColorStop(0, '#3a2818'); grad.addColorStop(0.5, '#2a1c10'); grad.addColorStop(1, '#100806');
    g.fillStyle = grad; g.fillRect(0,0,c.width,c.height);
    // window
    g.fillStyle = '#e6c578'; g.fillRect(c.width*0.55, c.height*0.18, c.width*0.30, c.height*0.40);
    g.fillStyle = '#251608';
    g.fillRect(c.width*0.70, c.height*0.18, 3, c.height*0.40);
    g.fillRect(c.width*0.55, c.height*0.38, c.width*0.30, 3);
    // bookshelves
    g.fillStyle = '#150a06'; g.fillRect(c.width*0.1, c.height*0.30, c.width*0.36, c.height*0.50);
    for (let b = 0; b < 12; b++) {
      g.fillStyle = `hsl(${10+Math.random()*40},${35+Math.random()*30}%,${12+Math.random()*15}%)`;
      const x = c.width*0.10 + (b%6)*(c.width*0.36/6) + 2;
      const y = c.height*0.30 + Math.floor(b/6)*(c.height*0.25);
      g.fillRect(x, y, c.width*0.36/6 - 4, c.height*0.22);
    }
    // light beam
    const beam = g.createLinearGradient(c.width*0.70, c.height*0.30, c.width*0.30, c.height);
    beam.addColorStop(0, 'rgba(240,200,130,0.22)'); beam.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = beam; g.fillRect(0,0,c.width,c.height);
  });
}

/* ---------- ROOM -------------------------------------------------------- */
const ROOM = { w: 18, d: 14, h: 5.0 };
const room = new THREE.Group(); scene.add(room);

const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(ROOM.w, ROOM.d),
  new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.55, metalness: 0.05 })
);
floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; room.add(floor);

const ceil = new THREE.Mesh(

const skyMat = new THREE.ShaderMaterial({
  uniforms: { time: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    varying vec2 vUv;
    uniform float time;
    float hash(float x){ return fract(sin(x*127.1)*43758.5453); }
    float hash2(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7)))*43758.5453); }
    float skylineH(float x){
      float h = 0.18;
      for (int i = 0; i < 30; i++){
        float fi = float(i);
        float bw = 0.025 + hash(fi*3.7) * 0.04;
        float bc = fi * bw * 1.05 + 0.02;
        float bh = 0.05 + hash(fi*1.3) * 0.22;
        if (x > bc - bw*0.5 && x < bc + bw*0.5) h = max(h, bh);
      }
      return h;
    }
    void main(){
      vec2 uv = vUv;
      // softer sunset gradient (less bright)
      vec3 horizon = vec3(0.78, 0.55, 0.32);
      vec3 mid     = vec3(0.66, 0.30, 0.16);
      vec3 violet  = vec3(0.20, 0.10, 0.24);
      vec3 deep    = vec3(0.04, 0.03, 0.10);
      vec3 sky = mix(horizon, mid, smoothstep(0.0, 0.35, uv.y));
      sky = mix(sky, violet, smoothstep(0.35, 0.75, uv.y));
      sky = mix(sky, deep, smoothstep(0.75, 1.0, uv.y));
      // sun (dimmer)
      vec2 sunPos = vec2(0.5, 0.30);
      float sd = distance(uv, sunPos);
      sky += vec3(0.95, 0.78, 0.55) * smoothstep(0.10, 0.0, sd) * 0.55;
      sky += vec3(0.92, 0.65, 0.42) * smoothstep(0.40, 0.05, sd) * 0.18;
      // cloud streaks
      float cl = sin(uv.x*9.0 + uv.y*3.0)*0.5 + 0.5;
      cl *= smoothstep(0.18, 0.45, uv.y) * (1.0 - smoothstep(0.55, 0.95, uv.y));
      sky = mix(sky, sky + vec3(0.03,0.01,0.0), cl * 0.35);
      // far skyline haze
      float h2 = skylineH(uv.x + 0.13) * 0.45 + 0.05;
      if (uv.y < h2){
        vec3 farB = mix(vec3(0.14, 0.07, 0.14), sky*0.85, smoothstep(0.0, h2, uv.y));
        sky = mix(farB, sky, smoothstep(h2-0.005, h2, uv.y));
      }
      // near skyline silhouette with windows
      float h = skylineH(uv.x);
      if (uv.y < h){
        vec3 b = mix(vec3(0.03, 0.02, 0.04), vec3(0.07, 0.04, 0.06), smoothstep(0.0, h, uv.y));
        float lit = 0.0;
        for (int i = 0; i < 30; i++){
          float fi = float(i);
          float bw = 0.025 + hash(fi*3.7) * 0.04;
          float bc = fi * bw * 1.05 + 0.02;
          float bh = 0.05 + hash(fi*1.3) * 0.22;
          if (uv.x > bc - bw*0.5 && uv.x < bc + bw*0.5 && uv.y < bh){
            vec2 grid = floor(vec2((uv.x-(bc-bw*0.5))/(bw*0.16), uv.y/(bh*0.18)));
            float on = hash2(grid + fi*17.0);
            vec2 cw = vec2(bw*0.16, bh*0.18);
            vec2 cc = vec2(bc-bw*0.5, 0.0) + grid * cw + cw*0.5;
            vec2 d = abs(vec2(uv.x, uv.y) - cc);
            if (d.x < cw.x*0.28 && d.y < cw.y*0.32 && on > 0.55) lit += 1.0;
          }
        }
        b += vec3(0.95, 0.62, 0.20) * clamp(lit, 0.0, 1.0) * 0.42;
        sky = mix(b, sky, smoothstep(h-0.003, h, uv.y));
      }
      // stars top
      float stars = step(0.997, hash2(floor(uv*vec2(220.0,140.0))));
      stars *= smoothstep(0.65, 1.0, uv.y);
      sky += stars * vec3(0.85, 0.82, 0.7) * 0.55;
      gl_FragColor = vec4(sky, 1.0);
    }
  `
});

/* ---------- ORNATE MIRROR ---------------------------------------------- */
function ornateOvalShape(rw, rh) {
  const shape = new THREE.Shape();
  const SEG = 220;
  for (let i = 0; i <= SEG; i++) {
    const t = (i / SEG) * Math.PI * 2;
    const cx = Math.cos(t), sy = Math.sin(t);
    let x = cx * rw, y = sy * rh;
    const topB    = Math.exp(-Math.pow((t - Math.PI/2) * 5, 2));
    const botB    = Math.exp(-Math.pow((t - 3*Math.PI/2) * 5, 2));
    const leftB   = Math.exp(-Math.pow((t - Math.PI) * 7, 2));
    const rightB  = Math.exp(-Math.pow(((t < Math.PI ? t : t - Math.PI*2)) * 7, 2));
    const bulge = topB * 0.22 + botB * 0.16 + leftB * 0.10 + rightB * 0.10;
    const ripple = Math.sin(t * 18) * 0.018 + Math.sin(t * 6) * 0.028;
    const grow = bulge + ripple;
    x += cx * grow * rw; y += sy * grow * rh;
    if (i === 0) shape.moveTo(x, y); else shape.lineTo(x, y);
  }
  const hole = new THREE.Path();
  const iw = rw * 0.82, ih = rh * 0.82;
  for (let i = 0; i <= 96; i++) {
    const t = (i / 96) * Math.PI * 2;
    const x = Math.cos(t) * iw, y = Math.sin(t) * ih;
    if (i === 0) hole.moveTo(x, y); else hole.lineTo(x, y);
  }
  shape.holes.push(hole);
  return shape;
}

/* mirror surface shader: image inside + glass overlay + subtle edge fire */
function makeMirrorMaterial(imgTex, edgeColor) {
  return new THREE.ShaderMaterial({
    transparent: false,
    side: THREE.DoubleSide,
    uniforms: {
      time:  { value: 0 },
      image: { value: imgTex },
      edge:  { value: new THREE.Color(edgeColor) }
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      varying vec2 vUv;
      uniform float time;
      uniform sampler2D image;
      uniform vec3 edge;

      void main() {
        vec2 uv = vUv;
        vec2 p = uv - 0.5;
        // image, dimmed so it reads as "captured in glass"
        vec3 col = texture2D(image, uv).rgb;
        col *= 0.55;
        col *= vec3(1.02, 0.95, 0.82);     // warm gilt cast

        // radial coord across the oval (geometry is squished circle)
        float rN = length(p) * 2.0;

        // soft vignette toward edge
        col *= mix(1.0, 0.40, smoothstep(0.55, 1.0, rN));

        // glass diagonal sheen
        float sheen = exp(-pow((uv.x*0.7 - uv.y*0.3 - 0.2 + sin(time*0.25)*0.04), 2.0) * 6.0);
        sheen *= smoothstep(1.0, 0.55, rN);
        col += vec3(0.30, 0.27, 0.18) * sheen * 0.16;

        // Doctor-Strange edge ring — soft, only at very rim
        float ring  = smoothstep(0.86, 0.94, rN) * (1.0 - smoothstep(0.95, 1.02, rN));
        float ring2 = smoothstep(0.78, 0.88, rN) * (1.0 - smoothstep(0.92, 0.97, rN)) * 0.45;
        float flick = 0.78 + 0.32 * sin(time*3.0 + uv.x*40.0) * sin(time*2.4 + uv.y*36.0);
        col += edge * (ring + ring2) * flick * 0.55;

        // very subtle top warm reflection (room glow)
        float top = smoothstep(0.7, 1.0, uv.y);
        col += vec3(0.15, 0.10, 0.05) * top * 0.10;

        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
}

/* small spark particles around the inner rim */
function makeSparks(rw, rh, hue) {
  const count = 60;                                          // ↓ much less than before
  const positions = new Float32Array(count * 3);
  const seeds = new Float32Array(count);
  const lifeOffset = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const t = Math.random() * Math.PI * 2;
    positions[i*3]   = Math.cos(t) * rw * 0.82;
    positions[i*3+1] = Math.sin(t) * rh * 0.82;
    positions[i*3+2] = 0;
    seeds[i] = Math.random();
    lifeOffset[i] = Math.random();
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  g.setAttribute('seed',     new THREE.BufferAttribute(seeds, 1));
  g.setAttribute('lifeOff',  new THREE.BufferAttribute(lifeOffset, 1));
  const mat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending,
    uniforms: {
      time: { value: 0 },
      color: { value: new THREE.Color(hue) },
      pixelRatio: { value: Math.min(devicePixelRatio, 2) },
      rw: { value: rw }, rh: { value: rh }
    },
    vertexShader: `
      attribute float seed;
      attribute float lifeOff;
      uniform float time;
      uniform float pixelRatio;
      uniform float rw;
      uniform float rh;
      varying float vLife;
      varying float vSeed;
      void main() {
        vSeed = seed;
        float life = fract(time * (0.20 + seed*0.25) + lifeOff);
        vLife = life;
        vec3 pos = position;
        float ang = atan(pos.y / rh, pos.x / rw);
        float r = 0.82 + life * 0.28;
        pos.x = cos(ang) * rw * r;
        pos.y = sin(ang) * rh * r + life * 0.20 * (0.7 + seed);
        pos.z = sin(time*2.0 + seed*30.0) * 0.04 * life;
        pos.x += sin(time*5.0 + seed*40.0) * 0.025 * life;
        pos.y += cos(time*4.0 + seed*50.0) * 0.025 * life;
        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
        float size = (6.0 + seed*14.0) * (1.0 - life*0.85);
        gl_PointSize = size * pixelRatio * (300.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      uniform vec3 color;
      varying float vLife;
      varying float vSeed;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        if (d > 0.5) discard;
        float falloff = pow(1.0 - d*2.0, 2.2);
        vec3 c = mix(vec3(1.0, 0.85, 0.5), color, vSeed);
        c = mix(c, vec3(1.0, 0.45, 0.15), 1.0 - falloff);
        float a = falloff * (1.0 - vLife) * 0.7;     // ↓ dimmer than before
        gl_FragColor = vec4(c, a);
      }
    `
  });
  return new THREE.Points(g, mat);
}

function makeBanner(label) {

/* build one mirror */
function buildMirror(haven, imgTex, rw = 0.85, rh = 1.15) {
  const group = new THREE.Group();
  group.userData.haven = haven;

  // frame
  const shape = ornateOvalShape(rw, rh);
  const frameGeom = new THREE.ExtrudeGeometry(shape, {
    steps: 1, depth: 0.10,
    bevelEnabled: true, bevelThickness: 0.04, bevelSize: 0.03, bevelOffset: 0, bevelSegments: 4
  });
  frameGeom.center();
  const goldMat = new THREE.MeshPhysicalMaterial({
    color: 0x7a5520, metalness: 1.0, roughness: 0.34,
    clearcoat: 0.5, clearcoatRoughness: 0.5
  });
  const frame = new THREE.Mesh(frameGeom, goldMat);
  frame.castShadow = true; frame.receiveShadow = true;
  group.add(frame);

  // bead ring
  const beadGeom = new THREE.SphereGeometry(0.022, 8, 8);
  const beadMat = new THREE.MeshPhysicalMaterial({ color: 0x956d2a, metalness: 1, roughness: 0.30 });
  const BEAD_COUNT = 96;
  const beads = new THREE.InstancedMesh(beadGeom, beadMat, BEAD_COUNT);
  const dummy = new THREE.Object3D();
  for (let i = 0; i < BEAD_COUNT; i++) {
    const t = (i / BEAD_COUNT) * Math.PI * 2;
    dummy.position.set(Math.cos(t) * rw * 0.79, Math.sin(t) * rh * 0.79, 0.06);
    dummy.updateMatrix();
    beads.setMatrixAt(i, dummy.matrix);
  }
  beads.instanceMatrix.needsUpdate = true;
  group.add(beads);

  // mirror surface: oval plane with image+glass+edge shader
  const surfaceGeom = new THREE.CircleGeometry(1, 96);
  for (let i = 0; i < surfaceGeom.attributes.position.count; i++) {
    const x = surfaceGeom.attributes.position.getX(i);
    const y = surfaceGeom.attributes.position.getY(i);
    surfaceGeom.attributes.position.setX(i, x * rw * 0.78);
    surfaceGeom.attributes.position.setY(i, y * rh * 0.78);
  }
  surfaceGeom.computeVertexNormals();
  const surfaceMat = makeMirrorMaterial(imgTex, haven.edge);
  const surface = new THREE.Mesh(surfaceGeom, surfaceMat);
  surface.position.z = 0.02;
  surface.userData.mirrorGroup = group;
  group.add(surface);
  group.userData.surfaceMat = surfaceMat;
  group.userData.surface = surface;
  group.userData.rw = rw;
  group.userData.rh = rh;

  // sparks
  const sparks = makeSparks(rw, rh, haven.edge);
  sparks.position.z = 0.05;
  group.add(sparks);
  group.userData.sparks = sparks;

  // banner
  const banner = new THREE.Mesh(
    new THREE.PlaneGeometry(rw * 1.3, 0.18),
    new THREE.MeshBasicMaterial({
      map: makeBanner((haven.name + ' ' + haven.sub).toUpperCase()),
      transparent: true, depthWrite: false
    })
  );
  banner.position.set(0, -rh - 0.08, 0.08);
  group.add(banner);

  // hitbox
  const hit = new THREE.Mesh(
    surfaceGeom.clone(),
    new THREE.MeshBasicMaterial({ visible: false, depthWrite: false })
  );
  hit.position.z = 0.03; hit.userData.mirrorGroup = group;
  group.add(hit);
  group.userData.hit = hit;

  return group;
}

const loader = new THREE.TextureLoader();

  return new Promise((resolve) => {

      (t) => {
        t.colorSpace = THREE.SRGBColorSpace;
        t.anisotropy = renderer.capabilities.getMaxAnisotropy();
        resolve(t);
      },
      undefined,
      () => { console.warn('failed:', url); resolve(null); }
    );
  });
}

  canvas2.position.z = 0.02; g.add(canvas2);
  const frameMat = goldTrimMat;
  const t = 0.06, d = 0.05;
  const ring = [
    new THREE.Mesh(new THREE.BoxGeometry(w + 2*t, t, d), frameMat),
    new THREE.Mesh(new THREE.BoxGeometry(w + 2*t, t, d), frameMat),
    new THREE.Mesh(new THREE.BoxGeometry(t, h, d), frameMat),
    new THREE.Mesh(new THREE.BoxGeometry(t, h, d), frameMat)
  ];
  ring[0].position.set(0,  h/2 + t/2, 0);
  ring[1].position.set(0, -h/2 - t/2, 0);
  ring[2].position.set(-w/2 - t/2, 0, 0);
  ring[3].position.set( w/2 + t/2, 0, 0);
  ring.forEach(m => g.add(m));
  g.position.set(x, y, z); g.rotation.y = rotY;
  room.add(g);
}

function armchair(x, z, rotY = 0) {

  const velvet = new THREE.MeshPhysicalMaterial({

  seat.position.y = 0.55; seat.castShadow = true; seat.receiveShadow = true; g.add(seat);
  const cush = new THREE.Mesh(new THREE.BoxGeometry(0.78, 0.12, 0.78), velvet);
  cush.position.y = 0.7; cush.castShadow = true; g.add(cush);
  const back = new THREE.Mesh(new THREE.BoxGeometry(0.85, 1.0, 0.16), velvet);
  back.position.set(0, 1.05, -0.34); back.castShadow = true; g.add(back);
  const top = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.85, 16, 1, false, 0, Math.PI), velvet);
  top.rotation.z = Math.PI/2; top.position.set(0, 1.52, -0.34); top.castShadow = true; g.add(top);
  const arm = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.45, 0.85), velvet);
  arm.position.set(-0.4, 0.78, 0); arm.castShadow = true; g.add(arm);
  const arm2 = arm.clone(); arm2.position.x = 0.4; g.add(arm2);
  for (let sx of [-1, 1]) for (let sz of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.05, 0.55, 8), wood);
    leg.position.set(sx*0.36, 0.28, sz*0.36); leg.castShadow = true; g.add(leg);
  }
  g.position.set(x, 0, z); g.rotation.y = rotY;
  room.add(g);
}

const consoleT = consoleTable(0, -ROOM.d/2 + 0.7);

/* ---------- chandelier -------------------------------------------------- */
const chand = new THREE.Group();

/* ---------- post-processing — restrained bloom -------------------------- */
const composer = new EffectComposer(renderer);

/* ---------- interaction ------------------------------------------------ */
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

let focused = null;
let camTween = null;
backBtn = document.getElementById('back-btn');
havenLabel = document.getElementById('haven-label');
ui = document.getElementById('ui');

function focusMirror(mirror) {
  focused = mirror;
  const mPos = new THREE.Vector3();
  mirror.getWorldPosition(mPos);
  const fwd = new THREE.Vector3(0, 0, 1).applyQuaternion(mirror.getWorldQuaternion(new THREE.Quaternion()));
  const camTarget = mPos.clone();
  const camPos = mPos.clone().add(fwd.multiplyScalar(2.2));
  camPos.y = Math.max(1.5, camPos.y);
  startCamTween(camPos, camTarget, 1.5);
  backBtn.classList.add('show');
  ui.style.opacity = '0';
  havenLabel.textContent = (mirror.userData.haven.name + ' ' + mirror.userData.haven.sub).toUpperCase();
  havenLabel.classList.add('show');
}
function unfocus() {
  focused = null;
  startCamTween(CAM_DEFAULT_POS.clone(), CAM_DEFAULT_TARGET.clone(), 1.6);
  backBtn.classList.remove('show');
  ui.style.opacity = '1';
  havenLabel.classList.remove('show');
}
function startCamTween(toPos, toTgt, dur) {
  camTween = {
    t: 0, dur,
    fromPos: camera.position.clone(),
    toPos: toPos.clone(),
    fromTgt: controls.target.clone(),
    toTgt: toTgt.clone()
  };
  controls.enabled = false;
}

backBtn.addEventListener('click', unfocus);

canvas.addEventListener('pointerdown', (e) => {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(mirrors.map(m => m.userData.hit), false);
  if (hits.length > 0) focusMirror(hits[0].object.userData.mirrorGroup);
});

let hovered = null;
canvas.addEventListener('pointermove', (e) => {
  if (focused) return;
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(mirrors.map(m => m.userData.hit), false);
  if (hits.length > 0) { canvas.style.cursor = 'pointer'; hovered = hits[0].object.userData.mirrorGroup; }
  else { canvas.style.cursor = 'default'; hovered = null; }
});

addEventListener('keydown', (e) => { if (e.key === 'Escape' && focused) unfocus(); });

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloom.setSize(innerWidth, innerHeight);
});

/* ---------- animation loop --------------------------------------------- */
const clock = new THREE.Clock();
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2; }

function animate() {
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  skyMat.uniforms.time.value = elapsed * 0.15;

  mirrors.forEach((m, i) => {
    if (m.userData.surfaceMat) m.userData.surfaceMat.uniforms.time.value = elapsed + i*1.7;
    if (m.userData.sparks)     m.userData.sparks.material.uniforms.time.value = elapsed + i*0.6;
    let scale = 1.0;
    if (m === focused) scale = 1.025 + Math.sin(elapsed*1.5)*0.008;
    else if (m === hovered) scale = 1.012;
    m.userData.surface.scale.setScalar(scale);
    m.userData.sparks.scale.setScalar(scale);
  });

  chand.rotation.y = Math.sin(elapsed * 0.25) * 0.02;

  for (let k of ['flame0','flame1','flame2']) {
    const f = consoleT.userData[k];
    if (f) {
      f.scale.y = 1.6 + Math.sin(elapsed*9 + Math.random()) * 0.15;
      f.material.opacity = 0.75 + Math.sin(elapsed*11)*0.1;
    }
  }

  if (camTween) {
    camTween.t += delta / camTween.dur;
    if (camTween.t >= 1) {
      camera.position.copy(camTween.toPos);
      controls.target.copy(camTween.toTgt);
      camTween = null;
      controls.enabled = !focused;
    } else {
      const k = easeInOutCubic(camTween.t);
      camera.position.lerpVectors(camTween.fromPos, camTween.toPos, k);
      controls.target.lerpVectors(camTween.fromTgt, camTween.toTgt, k);
    }
  } else if (!focused) {
    const b = Math.sin(elapsed * 0.35) * 0.03;
    camera.position.y = CAM_DEFAULT_POS.y + b;
  }

  controls.update();
  composer.render();
  requestAnimationFrame(animate);
}

/* ---------- boot -------------------------------------------------------- */
(async function boot() {
  await buildAllMirrors();
  // give the loader at least one full reveal cycle so the words can land
  const minLoaderMs = 4200;
  const t0 = performance.now();
  composer.render();
  const remaining = Math.max(0, minLoaderMs - (performance.now() - t0));
  setTimeout(() => {
    clearInterval(loaderInterval);
    document.getElementById('loader').classList.add('hide');
    animate();
  }, remaining);
})();
